syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";

message S_EnterGame
{
	bool success = 1;
	uint64 accountId = 2;
}

message S_MyPlayer
{
	uint64 objectid = 1;
	float posx = 2;
	float posy = 3;
	int32 dir = 4;
	int32 state = 5;
	float movespeed = 6;
}

message S_AddObject
{
	repeated uint64 objectids = 1;
	repeated int32 objecttypes = 2;
	repeated float posxs = 3;
	repeated float posys = 4;
	repeated int32 states = 5;
	repeated int32 dirs = 6;
	repeated float movespeeds = 7;
}

message S_RemoveObject
{
	repeated uint64 objectids = 1;
}

message C_Move
{
	uint64 objectid = 1;
	uint32 state = 2;
	int32 dir = 3;
	float posx = 4;
	float posy = 5;
}

message S_Move
{
	uint64 objectid = 1;
	uint32 state = 2;
	int32 dir = 3;
	float posx = 4;
	float posy = 5;
	bool needsync = 6; // MyPlayerภป ต๛ธฃตว, ฟภย๗ฐก ฝษวฯธ้ ธยร็ถ๓!
}

message S_Tilemap
{
	int32 mapsizex = 1;
	int32 mapsizey = 2;
	repeated int32 values = 3;
}

message C_WaterBomb
{
	uint64 ownerid = 1;
	int32 tileposx = 2;
	int32 tileposy = 3;
}

message S_WaterBomb
{
	uint64 objectid = 1;
	uint64 ownerid = 2;
	int32 tileposx = 3;
	int32 tileposy = 4;
}