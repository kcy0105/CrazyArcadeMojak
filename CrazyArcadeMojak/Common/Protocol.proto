syntax = "proto3";
package Protocol;

import "Struct.proto";

message S_EnterGame
{
	bool success = 1;
	uint64 accountId = 2;
}

message S_MyPlayer
{
	PlayerInfo info = 1;
}

message S_OtherPlayers
{
	repeated PlayerInfo infos = 1;
}

message S_PlayerLeave
{
	uint64 objectid = 1;
}

message C_Move
{
	uint64 objectid = 1;
	uint32 movestate = 2;
	int32 dir = 3;
	float posx = 4;
	float posy = 5;
}

message S_Move
{
	uint64 objectid = 1;
	uint32 movestate = 2;
	int32 dir = 3;
	float posx = 4;
	float posy = 5;
	bool needsync = 6; // MyPlayer을 따르되, 오차가 심하면 맞춰라!
}

message S_Tilemap
{
	int32 mapsizex = 1;
	int32 mapsizey = 2;
	repeated TileInfo infos = 3;
}

message C_WaterBomb
{
	uint64 ownerid = 1;
	int32 tileposx = 2;
	int32 tileposy = 3;
}

message S_WaterBomb
{
	uint64 objectid = 1;
	uint64 ownerid = 2;
	int32 tileposx = 3;
	int32 tileposy = 4;
}

message S_Explode
{
	uint64 objectid = 1;
	int32 up = 2;
	int32 down = 3;
	int32 left = 4;
	int32 right = 5;

	repeated DestroyedBlockInfo destroyedblockinfos = 6;
	repeated uint64 destroyeditemids = 8;
}

message S_RemoveItem
{
	uint64 objectid = 1;
}

message S_PlayerNormalSpeed
{
	uint64 objectid = 1;
	float normalspeed = 2;
}

message C_Skill
{
	uint64 playerid = 1;
}

message S_MainState
{
	uint64 playerid = 1;
	int32 mainstate = 2;
}