syntax = "proto3";
package Protocol;

message PlayerInfo
{
	uint64 objectid = 1;
	float posx = 2;
	float posy = 3;
	int32 mainstate = 4;
	int32 dir = 5;
}

message TileInfo
{
	uint64 objectid = 1;
	int32 mapobjecttype = 2;
	int32 detailedtype = 3;
}

message DestroyedBlockInfo
{
	uint64 blockid = 1;
	uint64 itemid = 2;
}